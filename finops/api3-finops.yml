description: >-
  FOCUS-aligned FinOps for API3: costs are incurred as gas-cost-denominated dAPI subscriptions
  purchased on the API3 Market. Mainnet plans are 3-month commitments priced at estimated
  operational gas costs (minimum $0.05/day per feed). Revenue flows back to dApps via OEV
  Rewards — 80% of auction proceeds paid monthly in native chain gas token — making the net
  oracle cost negative for sufficiently active DeFi protocols. Open-source Airnode deployment
  is free; costs are infrastructure (AWS Lambda or equivalent serverless) borne by the API
  provider operating the node.
sources:
  - https://docs.api3.org/dapps/integration/
  - https://docs.api3.org/dapps/oev-rewards/
  - https://market.api3.org/
