costDrivers:
  - name: dAPI subscription (mainnet)
    description: >-
      3-month prepaid subscription covering estimated gas costs to maintain the chosen
      deviation threshold and heartbeat for a single feed on a single EVM chain.
      Minimum $0.05/day; actual cost scales with network gas prices and update frequency.
    unit: subscription per feed per chain
    billingPeriod: 3-month upfront
    pricingModel: estimated-gas-cost
  - name: dAPI subscription (testnet)
    description: 7-day free trial subscription on supported testnets.
    unit: subscription per feed per testnet
    billingPeriod: 7-day
    pricingModel: free
  - name: OEV Rewards (revenue)
    description: >-
      Inbound revenue to the dApp representing 80% of OEV auction proceeds captured
      around the dApp's oracle updates. Paid monthly in native chain gas token.
      Recognized as negative cost / revenue offset against oracle subscription spend.
    unit: percentage of OEV auction proceeds
    billingPeriod: monthly payout
    pricingModel: revenue-share-80pct
optimizationOpportunities:
  - name: Choose a wider deviation threshold
    description: >-
      Selecting 2.5% or 5% deviation thresholds reduces the number of on-chain updates
      per period and lowers operational gas costs substantially versus 0.25% or 0.5%.
      Assess protocol sensitivity to stale prices before widening thresholds.
  - name: Enable OEV Rewards
    description: >-
      Deploying a custom OEV proxy instead of the generic shared proxy enables the dApp
      to receive 80% of MEV captured around its feeds, potentially recovering all or
      more of subscription costs for high-TVL protocols.
  - name: Consolidate chains
    description: >-
      Each chain deployment requires a separate subscription. Consolidating liquidity to
      fewer, higher-volume chains reduces total subscription spend while retaining coverage
      where TVL is highest.
  - name: Monitor gas credit rollover
    description: >-
      If actual gas costs fall below estimates, the difference rolls over as credit toward
      the next plan on the same chain+feed pair. Track rollover balances to reduce renewal cost.
