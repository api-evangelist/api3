aid: api3
url: https://raw.githubusercontent.com/api-evangelist/api3/refs/heads/main/apis.yml
name: API3
kind: company
description: >-
  API3 is a first-party blockchain oracle network that connects real-world APIs directly to smart
  contracts without intermediary nodes. Its core technology is Airnode, a serverless oracle node
  that API providers operate themselves, cryptographically signing data before serving it on-chain.
  The API3 Market enables dApp developers to subscribe to managed decentralized APIs (dAPIs) —
  aggregated, multi-source data feeds covering 150+ price pairs across 40+ EVM chains — without
  speaking to a sales rep or signing a contract. API3's OEV (Oracle Extractable Value) mechanism
  captures MEV that traditionally leaks to bots around oracle updates and redistributes 80% of that
  revenue to the dApps reading the feeds, creating a net-positive oracle revenue model. The DAO
  governs the network via staked API3 tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
